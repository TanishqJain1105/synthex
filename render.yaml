# Render Blueprint for Synthex (backend + datastores).
# Deploy: Render Dashboard > New > Blueprint > pick the synthex repo > Apply.
#
# This provisions ONE always-on web service that runs the Express API AND the
# in-process BullMQ researcher worker (src/index.ts imports src/queue/worker.ts),
# plus managed Postgres (with pgvector) and a Redis-compatible Key Value store.
#
# NOTE: numInstances is pinned to 1 on purpose. The API keeps in-memory job state
# during a research session, so scaling to 2+ instances would let an SSE client
# reconnect to an instance that has no memory of the job. Do not autoscale until
# that state is moved fully into Redis.

databases:
  - name: synthex-db
    databaseName: synthex
    user: synthex
    plan: free                 # free expires after 30 days — upgrade to `basic-256mb`+ for production
    postgresMajorVersion: "16"

services:
  # Redis-compatible store for the scratchpad, BullMQ queue, and pub/sub bus.
  - type: keyvalue
    name: synthex-redis
    plan: free
    maxmemoryPolicy: noeviction  # BullMQ REQUIRES noeviction — do not change
    ipAllowList: []              # empty = reachable only from Render services

  # Express API + in-process researcher worker.
  - type: web
    name: synthex-api
    runtime: node
    plan: free                  # free SLEEPS after ~15 min idle (kills in-flight jobs/SSE).
                                # Use `starter` for an always-on backend.
    region: oregon
    numInstances: 1             # keep at 1 — see note at top of file
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=src
    startCommand: node dist/src/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: synthex-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: synthex-redis
          property: connectionString
      # ---- Secrets: paste these in the Render dashboard (sync:false = not stored in repo) ----
      - key: GROQ_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      # WEB_ORIGIN = your deployed Vercel URL, e.g. https://synthex.vercel.app
      # Locks CORS to exactly that origin in production.
      - key: WEB_ORIGIN
        sync: false
      # ---- Tunables (safe defaults, edit as needed) ----
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_RESEARCHER_AGENTS
        value: "3"
      - key: MAX_REQUERY_ROUNDS
        value: "3"
      - key: CRITIC_CONFIDENCE_THRESHOLD
        value: "0.7"
